<!DOCTYPE html>
<html lang="en" data-i18n-title="meta.title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Retrieval</title>
  <script src="/static/i18n.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      padding-bottom: 5rem;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.2rem; }

    .search-bar {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input[type="text"]:focus { border-color: #555; }

    button {
      padding: 0.65rem 1.4rem;
      font-size: 1rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled { opacity: 0.5; cursor: default; }

    #status {
      max-width: 900px;
      margin: 0.6rem auto 0;
      padding: 0 1.5rem;
      font-size: 0.85rem;
      color: #666;
      min-height: 1.2em;
    }

    #grid {
      max-width: 900px;
      margin: 1.5rem auto 3rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.8rem;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: visible;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      position: relative;
      transition: box-shadow 0.15s, transform 0.1s;
    }

    .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

    .card-inner {
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid transparent;
      transition: border-color 0.15s;
    }

    .card.selected .card-inner {
      border-color: #0071e3;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card .score {
      padding: 0.35rem 0.6rem;
      font-size: 0.78rem;
      color: #555;
      text-align: right;
    }

    /* ── Selection badge (checkmark, step 1) ── */
    .badge {
      position: absolute;
      top: -7px;
      left: -7px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #0071e3;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    /* ── Sticky selection bar ── */
    #sel-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }

    #sel-bar .sel-label {
      font-size: 0.9rem;
      color: #444;
      flex: 1;
    }

    #sel-bar .sel-label strong {
      color: #0071e3;
    }

    #sel-thumbs {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .sel-thumb {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sel-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #clear-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #clear-btn:hover { background: #e0e0e0; }

    #order-btn {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    #order-btn:hover { background: #005bb5; }
    #order-btn:disabled { opacity: 0.4; cursor: default; }

    #sel-bar.empty { opacity: 0.4; pointer-events: none; }

    /* ── Step 2: Ordering overlay ── */
    #order-overlay {
      position: fixed;
      inset: 0;
      background: #f5f5f5;
      z-index: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #order-overlay.hidden { display: none; }

    .order-header {
      padding: 1rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .order-header h2 {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }

    .back-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .back-btn:hover { background: #e0e0e0; }

    .order-footer {
      padding: 0.75rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    #confirm-btn {
      padding: 0.55rem 1.3rem;
      font-size: 0.9rem;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    #confirm-btn:hover { background: #005bb5; }
    #confirm-btn:disabled { opacity: 0.4; cursor: default; }

    #order-grid {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      align-content: start;
    }

    .order-hint {
      font-size: 0.8rem;
      color: #888;
      width: 100%;
      grid-column: 1 / -1;
      padding: 0 0.25rem 0.25rem;
    }

    /* ── Draggable order card ── */
    .order-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: grab;
      position: relative;
      user-select: none;
      transition: box-shadow 0.15s, opacity 0.15s, transform 0.1s;
      border: 3px solid transparent;
    }

    .order-card:active { cursor: grabbing; }

    .order-card.dragging {
      opacity: 0.35;
      transform: scale(0.97);
    }

    .order-card.drag-over {
      border-color: #0071e3;
      box-shadow: 0 0 0 2px #0071e380;
    }

    .order-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px 6px 0 0;
      display: block;
      pointer-events: none;
    }

    .order-card .rank-badge {
      position: absolute;
      top: -9px;
      left: -9px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #0071e3;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    .order-card .drag-label {
      padding: 0.3rem 0.6rem 0.35rem;
      font-size: 0.72rem;
      color: #999;
      text-align: center;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 400;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── Step 1: Search & Select ── -->
<header>
  <h1 data-i18n="meta.title">Image Retrieval</h1>
  <div class="search-bar">
    <input id="query" type="text" data-i18n-placeholder="search.placeholder"
           placeholder="e.g. a person running on the beach" />
    <button id="btn" onclick="search()" data-i18n="search.button">Search</button>
  </div>
</header>

<div id="status"></div>
<div id="grid"></div>

<div id="sel-bar" class="empty">
  <div class="sel-label">
    <span id="sel-label-text">Selected: <strong id="sel-count">0</strong> / 9</span>
  </div>
  <div id="sel-thumbs"></div>
  <button id="clear-btn" onclick="clearSelection()" data-i18n="select.clearBtn">Clear</button>
  <button id="order-btn" onclick="openOrderOverlay()" disabled
          data-i18n="select.orderBtn">Order photos →</button>
</div>

<!-- ── Step 2: Ordering overlay ── -->
<div id="order-overlay" class="hidden">
  <div class="order-header">
    <button class="back-btn" onclick="closeOrderOverlay()"
            data-i18n="order.backBtn">← Back</button>
    <h2 data-i18n="order.heading">Drag to rank your photos — 1 appears first in the flipbook</h2>
  </div>
  <div id="order-grid"></div>
  <div class="order-footer">
    <button id="confirm-btn" onclick="submitSelection()"
            data-i18n="order.confirmBtn">Generate flipbook</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const input        = document.getElementById('query');
  const btn          = document.getElementById('btn');
  const status       = document.getElementById('status');
  const grid         = document.getElementById('grid');
  const selBar       = document.getElementById('sel-bar');
  const selCount     = document.getElementById('sel-count');
  const orderBtn     = document.getElementById('order-btn');
  const orderOverlay = document.getElementById('order-overlay');
  const orderGrid    = document.getElementById('order-grid');
  const confirmBtn   = document.getElementById('confirm-btn');
  const toast        = document.getElementById('toast');

  let toastTimer = null;
  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.style.background = isError ? '#c0392b' : '#1a1a1a';
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  // ── Step 1 state ──────────────────────────────────────────────────────────
  // selection: unordered set of {imageIndex, modelRank, cardEl}
  // userRank is NOT assigned here — it comes from step 2.
  let selection = [];

  function updateSelLabel() {
    // Rebuild the "Selected: N / 9" text using i18n
    const label = document.getElementById('sel-label-text');
    label.innerHTML = t('select.count', { n: `<strong id="sel-count">${selection.length}</strong>` });
  }

  function toggleSelection(card, imageIndex, modelRank) {
    const existingIdx = selection.findIndex(s => s.imageIndex === imageIndex);
    if (existingIdx !== -1) {
      selection.splice(existingIdx, 1);
    } else {
      if (selection.length >= 9) { showToast(t('select.maxReached')); return; }
      selection.push({ imageIndex, modelRank, cardEl: card });
    }
    rebuildBadges();
    updateSelBar();
  }

  function rebuildBadges() {
    document.querySelectorAll('.card').forEach(c => {
      c.classList.remove('selected');
      const b = c.querySelector('.badge');
      if (b) b.remove();
    });
    selection.forEach(s => {
      s.cardEl.classList.add('selected');
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = '✓';
      s.cardEl.appendChild(badge);
    });
  }

  function updateSelBar() {
    const hasAny = selection.length > 0;
    selBar.classList.toggle('empty', !hasAny);
    orderBtn.disabled = !hasAny;
    updateSelLabel();

    const selThumbs = document.getElementById('sel-thumbs');
    selThumbs.innerHTML = '';
    selection.forEach(s => {
      const thumb = document.createElement('div');
      thumb.className = 'sel-thumb';
      const img = document.createElement('img');
      img.src = `/api/image/${s.imageIndex}`;
      thumb.appendChild(img);
      selThumbs.appendChild(thumb);
    });
  }

  function clearSelection() {
    selection = [];
    rebuildBadges();
    updateSelBar();
  }

  // ── Step 2: Ordering overlay ──────────────────────────────────────────────
  let orderedItems = [];
  let dragSrcIdx   = null;

  function openOrderOverlay() {
    if (!selection.length) return;
    orderedItems = selection.map(s => ({ ...s }));
    renderOrderGrid();
    orderOverlay.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeOrderOverlay() {
    orderOverlay.classList.add('hidden');
    document.body.style.overflow = '';
  }

  function renderOrderGrid() {
    orderGrid.innerHTML = '';

    const hint = document.createElement('p');
    hint.className = 'order-hint';
    hint.textContent = t('order.hint');
    orderGrid.appendChild(hint);

    orderedItems.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'order-card';
      card.draggable = true;
      card.dataset.idx = i;

      const badge = document.createElement('div');
      badge.className = 'rank-badge';
      badge.textContent = i + 1;

      const img = document.createElement('img');
      img.src = `/api/image/${item.imageIndex}`;
      img.alt = `photo ${i + 1}`;

      const label = document.createElement('div');
      label.className = 'drag-label';
      label.textContent = '⠿ ' + t('order.dragLabel');

      card.appendChild(badge);
      card.appendChild(img);
      card.appendChild(label);

      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragover',  onDragOver);
      card.addEventListener('dragleave', onDragLeave);
      card.addEventListener('drop',      onDrop);
      card.addEventListener('dragend',   onDragEnd);

      orderGrid.appendChild(card);
    });
  }

  function onDragStart(e) {
    dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }

  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    const targetIdx = parseInt(e.currentTarget.dataset.idx);
    e.currentTarget.classList.remove('drag-over');
    if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;

    const [moved] = orderedItems.splice(dragSrcIdx, 1);
    orderedItems.splice(targetIdx, 0, moved);
    dragSrcIdx = null;
    renderOrderGrid();
  }

  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    orderGrid.querySelectorAll('.order-card').forEach(c => c.classList.remove('drag-over'));
    dragSrcIdx = null;
  }

  // ── Submit (from step 2) ──────────────────────────────────────────────────
  async function submitSelection() {
    if (!orderedItems.length) return;
    const prompt = input.value.trim();
    if (!prompt) { showToast(t('select.needSearch'), true); return; }

    confirmBtn.disabled = true;
    try {
      const selections = orderedItems.map((item, i) => ({
        imageIndex: item.imageIndex,
        modelRank:  item.modelRank,
        userRank:   i + 1,
      }));

      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, selections }),
      });
      if (!res.ok) throw new Error(await res.text());

      const indices = orderedItems.map(s => s.imageIndex).join(',');
      const lang    = i18n.getCurrentLocale();
      window.location.href = `/flipbook?images=${indices}&prompt=${encodeURIComponent(prompt)}&lang=${lang}`;
    } catch (err) {
      showToast(t('search.error', { msg: err.message }), true);
      confirmBtn.disabled = false;
    }
  }

  // ── Search ────────────────────────────────────────────────────────────────
  async function search() {
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    status.textContent = t('search.searching');
    grid.innerHTML = '';
    clearSelection();

    try {
      const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      status.textContent = t('search.results', { n: data.indices.length, query });

      for (let i = 0; i < data.indices.length; i++) {
        const idx       = data.indices[i];
        const sim       = data.similarities[i];
        const modelRank = i + 1;

        const card  = document.createElement('div');
        card.className = 'card';

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        const img = document.createElement('img');
        img.src     = `/api/image/${idx}`;
        img.alt     = `result ${modelRank}`;
        img.loading = 'lazy';

        const score = document.createElement('div');
        score.className   = 'score';
        score.textContent = sim.toFixed(3);

        inner.appendChild(img);
        inner.appendChild(score);
        card.appendChild(inner);

        card.addEventListener('click', () => toggleSelection(card, idx, modelRank));

        grid.appendChild(card);
      }
    } catch (err) {
      status.textContent = t('search.error', { msg: err.message });
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
