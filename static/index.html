<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Editorial Flipbook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="control-panel">
        <h1>Editorial Flipbook</h1>
        <p class="subtitle">Generate an interactive A4 magazine layout</p>
        
        <div class="controls">
            <div class="input-group">
                <label for="prompt">Topic Prompt:</label>
                <input type="text" id="prompt" value="modern sustainable architecture integrated with nature">
            </div>
            
            <div class="generation-controls">
                <div class="input-group">
                    <label for="numPages">Pages:</label>
                    <input type="number" id="numPages" value="5" min="1" max="10">
                </div>
                <button id="generateBtn" class="btn-generate">Generate Flipbook</button>
            </div>
        </div>
    </div>

    <div id="flipbookView" class="flipbook-view hidden">
        <div class="nav-controls">
            <button id="prevPage" class="nav-btn">← Previous Page</button>
            <div class="page-info">
                <span>Page <span id="currentPage">1</span> of <span id="totalPages">1</span></span>
            </div>
            <button id="nextPage" class="nav-btn">Next Page →</button>
        </div>

        <div class="flipbook-stage">
            <div class="book-container">
                <div class="book" id="flipbook">
                    </div>
            </div>
        </div>
    </div>

    <script src="flipbook.js"></script>
</body>
</html>
