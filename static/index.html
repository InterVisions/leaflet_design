<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Editorial Flipbook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="control-panel">
        <button id="generateBtn" class="btn-generate">Generate Flipbook</button>
    </div>

    <div id="flipbookView" class="flipbook-view hidden">
        <div class="nav-controls">
            <button id="prevPage" class="nav-btn">← Previous</button>
            <div class="page-info">
                <span>Page <span id="currentPage">1</span> of 5</span>
            </div>
            <button id="nextPage" class="nav-btn">Next →</button>
        </div>

        <div class="flipbook-stage">
            <div class="book-container">
                <div class="book" id="flipbook">
                    </div>
            </div>
        </div>
    </div>

    <script src="flipbook.js"></script>
</body>
</html>
