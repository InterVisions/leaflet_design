<!DOCTYPE html>
<html lang="en" data-i18n-title="flipbook.title">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Flipbook</title>
    <script src="/static/i18n.js"></script>
    <link rel="stylesheet" href="/static/flipbook.css">
</head>
<body>
    <div class="top-bar">
        <a href="/" class="back-link" data-i18n="flipbook.backLink">← Back to search</a>
    </div>

    <div id="flipbookView" class="flipbook-view hidden">
        <div class="nav-controls">
            <button id="prevPage" class="nav-btn" data-i18n="flipbook.prevBtn">← Previous</button>
            <div class="page-info">
                <span id="pageInfo"></span>
            </div>
            <button id="nextPage" class="nav-btn" data-i18n="flipbook.nextBtn">Next →</button>
        </div>

        <div class="flipbook-stage">
            <div class="book-container">
                <div class="book" id="flipbook"></div>
            </div>
        </div>
    </div>

    <div id="errorMsg" class="hidden error-msg">
        <p>
            <span data-i18n="flipbook.noImages">No images found.</span>
            <a href="/" data-i18n="flipbook.goBack">Go back to search and select images.</a>
        </p>
    </div>

    <script src="/static/flipbook.js"></script>
</body>
</html>
